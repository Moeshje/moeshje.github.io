<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Systems</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-image: url('starpaper_50.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .text-box {
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            max-width: 80%;
        }

        .space-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            display: inline-block;
            padding: 12px 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #f6f7cd;
            border-radius: 50px;
            box-shadow: 0 0 10px rgba(246, 247, 205, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .space-btn:hover {
            background: #f6f7cd;
            color: #000000;
            box-shadow: 0 0 25px rgba(246, 247, 205, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <a href="/ceylonstudio" class="space-btn">Discover Ceylon Studio</a>

    <div class="text-box">
        Welcome to Star Systems
    </div>

</body>
</html>
