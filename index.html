<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Systems</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000000 url(https://i.imgur.com/MAfI42c.jpeg) center center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tekstvak {
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 1px;
            padding: 30px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            max-width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .space-knop {
            display: inline-block;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00d2ff;
            border-radius: 50px;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .space-knop:hover {
            background: #00d2ff;
            color: #000000;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="tekstvak">
        Welkom bij Star Systems
        <a href="/ceylonstudio" class="space-knop">Ontdek Cinnamon</a>
    </div>

</body>
</html>
