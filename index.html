<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="star-favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-image: url('starpaper_50.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .text-box {
            position: absolute;
            top: 40px;
            right: 40px;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: right;
            letter-spacing: 1px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            max-width: 50%;
        }

        .space-btn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #f6f7cd;
            border-radius: 50px;
            box-shadow: 0 0 10px rgba(246, 247, 205, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .space-btn:hover {
            background: #f6f7cd;
            color: #000000;
            box-shadow: 0 0 25px rgba(246, 247, 205, 0.6);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                justify-content: space-between;
                padding: 40px 20px;
            }

            .text-box {
                position: relative;
                top: auto;
                right: auto;
                max-width: 100%;
                width: 100%;
                font-size: 1.8rem;
                text-align: center;
                padding: 20px;
                order: 1;
            }

            .space-btn {
                position: relative;
                bottom: auto;
                left: auto;
                width: 100%;
                text-align: center;
                margin-top: auto;
                order: 2;
            }
        }
    </style>
</head>
<body>

    <div class="text-box">
        Welcome to Star Systems
    </div>

    <a href="/ceylonstudio" class="space-btn">Discover Ceylon Studio</a>

</body>
</html>
